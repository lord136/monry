<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business 10X - Strategic Growth Framework</title>
    <meta name="description" content="Transform your business with proven growth strategies. Get a custom 10X roadmap for your specific industry.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #FFFBF0 0%, #FFF9E6 50%, #FFFEF8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .hero {
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 900;
            letter-spacing: -2.5px;
            background: linear-gradient(135deg, #D4A017 0%, #FFD700 50%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.15);
            line-height: 1.1;
        }

        .subtitle {
            font-size: 20px;
            color: #8B7355;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 15px;
            color: #A89580;
            font-weight: 500;
            font-style: italic;
        }

        .input-section {
            margin-bottom: 80px;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.2s forwards;
        }

        .input-container {
            position: relative;
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
        }

        .input-field {
            width: 100%;
            padding: 24px 150px 24px 36px;
            font-size: 18px;
            font-weight: 500;
            border: 2px solid #FFE5A0;
            border-radius: 60px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(to right, #FFFFFF 0%, #FFFEF8 100%);
            font-family: 'Inter', sans-serif;
            color: #2C2416;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 12px rgba(255, 215, 0, 0.08);
        }

        .input-field:focus {
            border-color: #FFD700;
            background: #FFFFFF;
            box-shadow: 0 6px 32px rgba(255, 215, 0, 0.25), 0 0 0 4px rgba(255, 215, 0, 0.1);
            transform: translateY(-1px);
        }

        .input-field::placeholder {
            color: #C4A962;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .input-controls {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #2C2416;
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(255, 165, 0, 0.35);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }

        .analyze-btn:hover {
            background: linear-gradient(135deg, #FFC700 0%, #FF9500 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255, 165, 0, 0.45);
        }

        .analyze-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px rgba(255, 165, 0, 0.3);
        }

        .loading {
            display: none;
            margin: 60px 0;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #FFE5A0;
            border-top-color: #FFD700;
            border-radius: 50%;
            margin: 0 auto 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 17px;
            color: #8B7355;
            font-weight: 600;
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .results-header {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 800;
            background: linear-gradient(135deg, #D4A017 0%, #FFD700 50%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 18px;
            letter-spacing: -1.2px;
        }

        .result-note {
            min-height: 24px;
            margin-bottom: 40px;
            color: #6B5D4F;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.6;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 22px;
            max-width: 750px;
            margin: 0 auto;
        }

        .step-card {
            background: #FFFFFF;
            border: 2px solid #FFE5A0;
            border-radius: 18px;
            padding: 28px 32px;
            text-align: left;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .step-card.animate {
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step-card:hover {
            border-color: #FFD700;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.15);
            transform: translateY(-2px);
        }

        .step-number {
            font-size: 13px;
            font-weight: 700;
            color: #D4A017;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .step-title {
            font-size: 21px;
            font-weight: 700;
            color: #2C2416;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            line-height: 1.3;
        }

        .step-description {
            font-size: 15.5px;
            color: #5A4D3F;
            line-height: 1.7;
            font-weight: 500;
        }

        .locked-card {
            background: linear-gradient(135deg, #2C2416 0%, #3D3120 100%);
            border: 2px solid #D4A017;
            position: relative;
            overflow: hidden;
        }

        .locked-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700, #D4A017);
            border-radius: 18px;
            z-index: -1;
            opacity: 0.4;
            animation: pulse 2s ease-in-out infinite;
            background-size: 200% 200%;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.4;
                background-position: 0% 50%;
            }
            50% {
                opacity: 0.6;
                background-position: 100% 50%;
            }
        }

        .locked-card .step-number {
            color: #FFD700;
        }

        .locked-card .step-title {
            color: #FFFFFF;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lock-icon {
            font-size: 24px;
            filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.5));
        }

        .locked-card .step-description {
            color: #E5D5B7;
            margin-bottom: 32px;
        }

        .payment-section {
            background: rgba(212, 160, 23, 0.08);
            border-radius: 14px;
            padding: 26px;
            margin-top: 22px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .qr-code {
            background: #FFFFFF;
            padding: 22px;
            border-radius: 14px;
            display: inline-block;
            margin: 22px 0;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
            border: 2px solid #FFD700;
        }

        .qr-code img {
            width: 230px;
            height: 230px;
            display: block;
            object-fit: cover;
        }

        .payment-text {
            font-size: 19px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 16px;
            letter-spacing: 0.4px;
        }

        .payment-instruction {
            font-size: 14.5px;
            color: #FFF8E1;
            line-height: 1.8;
            margin-top: 22px;
            padding: 18px;
            background: rgba(255, 215, 0, 0.12);
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .payment-instruction strong {
            color: #FFD700;
            font-weight: 700;
        }

        .personalization-note {
            font-size: 13.5px;
            color: #D4C5A9;
            margin-top: 14px;
            font-style: italic;
            font-weight: 500;
            line-height: 1.6;
        }

        .back-btn {
            margin-top: 60px;
            background: transparent;
            border: 2px solid #FFD700;
            color: #6B5D4F;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: #FFA500;
            color: #2C2416;
            background: rgba(255, 215, 0, 0.12);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.2);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 52px;
            }

            .subtitle {
                font-size: 18px;
            }

            .tagline {
                font-size: 14px;
            }

            .input-field {
                padding: 22px 140px 22px 28px;
                font-size: 17px;
            }

            .analyze-btn {
                padding: 14px 32px;
                font-size: 15px;
                letter-spacing: 1px;
            }

            .results-header {
                font-size: 36px;
            }

            .step-card {
                padding: 24px 26px;
            }

            .step-title {
                font-size: 19px;
            }

            .qr-code img {
                width: 190px;
                height: 190px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 42px;
            }

            .input-field {
                padding: 22px 26px 90px 26px;
            }

            .input-controls {
                position: static;
                transform: none;
                justify-content: center;
                margin-top: 18px;
                width: 100%;
            }

            .analyze-btn {
                width: 100%;
                padding: 18px 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="heroSection">
            <div class="hero">
                <h1 class="title">Business 10X</h1>
                <p class="subtitle">Strategic Growth Framework for Modern Businesses</p>
                <p class="tagline">Proven strategies. Systematic execution. Exponential results.</p>
            </div>

            <div class="input-section">
                <div class="input-container">
                    <input
                        type="text"
                        class="input-field"
                        id="businessInput"
                        placeholder="Describe your business..."
                        autocomplete="off"
                    >
                    <div class="input-controls">
                        <button class="analyze-btn" id="analyzeBtn">Analyze</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p class="loading-text" id="loadingText">Analyzing your business model...</p>
        </div>

        <div class="results" id="results">
            <h2 class="results-header">Your 10X Growth Roadmap</h2>
            <p class="result-note" id="resultNote"></p>
            <div class="steps-container" id="stepsContainer"></div>
            <button class="back-btn" id="backBtn">Create New Analysis</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
